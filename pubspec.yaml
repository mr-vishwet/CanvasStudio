name: canvas_studio
description: A lightweight, general-purpose Flutter SDK for image and video editing with layered canvas, audio, and template support.
version: 0.1.0
homepage: https://github.com/yourorg/canvas_studio

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Fonts
  google_fonts: ^6.2.1

  # Image handling
  cached_network_image: ^3.3.1
  image_cropper: ^11.0.0          # was ^7.0.0 — v11 fixes web dep conflict with image_background_remover
  image: ^4.1.7

  # Background removal — ONNX on-device (adds ~30MB to app)
  image_background_remover: ^2.0.0

  # Video / FFmpeg on-device — latest stable is 4.1.0
  ffmpeg_kit_flutter_new: ^4.1.0  # was ^6.0.3 (never existed) and ^3.2.0 (outdated)
  video_player: ^2.8.3
  video_thumbnail: ^0.5.3

  # Audio playback — latest is 0.10.5
  just_audio: ^0.10.0             # was ^0.9.38 (outdated)

  # Color picker
  flutter_colorpicker: ^1.1.0

  # Matrix math helper (replaces deprecated matrix_gesture_detector)
  matrix4_transform: ^4.0.1

  # Local storage
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # In-app purchases
  in_app_purchase: ^3.1.13

  # Export / save to gallery
  image_gallery_saver: ^2.0.3
  path_provider: ^2.1.2
  dio: ^5.4.3

  # Cache manager
  flutter_cache_manager: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  alchemist: ^0.10.0              # replaces abandoned golden_toolkit
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true    # ← ADD THIS

  assets:
    - assets/fonts/indic/
    - assets/fonts/latin/
    - assets/templates/starter/
    - assets/stickers/default/
    - assets/audio/starter/
    - assets/icons/
